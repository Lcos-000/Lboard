#这是Docker Compose文件，用于启动Whiteboard的开发环境
services:
  # PostgreSQL，用于存储Whiteboard的数据
  # 数据库名称：whiteboard
  # 数据库用户名：whiteboard
  # 数据库密码：whiteboard
  postgres:
    image: postgres:16-alpine
    container_name: whiteboard-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-whiteboard}
      POSTGRES_USER: ${POSTGRES_USER:-whiteboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-whiteboard}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    #通过pg_isready检查PostgreSQL是否启动完成
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-whiteboard} -d $${POSTGRES_DB:-whiteboard}"]
      interval: 5s
      timeout: 3s
      retries: 20
  # Redis，用于缓存Whiteboard的数据
  # 数据库用户名：whiteboard
  # 数据库密码：whiteboard
  # 数据库端口：6379
  redis:
    image: redis:7-alpine
    container_name: whiteboard-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
  # MinIO，用于存储Whiteboard的文件
  # 数据库用户名：minioadmin
  # 数据库密码：minioadmin
  # 数据库端口：9000
  # 数据库控制台端口：9001
  minio:
    image: minio/minio:latest
    container_name: whiteboard-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
  # Whiteboard Server，用于处理Whiteboard的业务逻辑
  # 数据库用户名：whiteboard
  # 数据库密码：whiteboard
  # 数据库端口：8080
  # 数据库控制台端口：9001
  whiteboard-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: whiteboard-server
    environment:
      WB_SERVER_ADDR: ":8080"
      WB_SERVER_GIN_MODE: "debug"
      WB_LOG_LEVEL: "debug"

      WB_POSTGRES_DSN: "postgres://whiteboard:whiteboard@postgres:5432/whiteboard?sslmode=disable"

      WB_REDIS_ADDR: "redis:6379"
      WB_REDIS_PASSWORD: ""
      WB_REDIS_DB: "0"

      WB_MINIO_ENDPOINT: "minio:9000"
      WB_MINIO_ACCESS_KEY: "minioadmin"
      WB_MINIO_SECRET_KEY: "minioadmin"
      WB_MINIO_USE_SSL: "false"
      WB_MINIO_BUCKET: "whiteboard"
    ports:
      - "8080:8080"
    # 等待PostgreSQL、Redis和MinIO启动完成
    # 这是确保Whiteboard Server在数据库和对象存储服务启动完成后启动，是docker-compose提供的功能
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
  # Prometheus，用于监控Whiteboard的运行状态
  # 数据库用户名：admin
  # 数据库密码：admin
  # 数据库端口：9090
  prometheus:
    image: prom/prometheus:latest
    container_name: whiteboard-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deployments/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - whiteboard-server
  # Grafana，用于可视化Whiteboard的运行状态
  # 数据库用户名：admin
  # 数据库密码：admin
  # 数据库端口：3000
  grafana:
    image: grafana/grafana:latest
    container_name: whiteboard-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deployments/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
# 定义数据卷，用于存储Whiteboard的数据，相当于在Docker主机上创建了一个目录，用于存储Whiteboard的数据
volumes:
  postgres_data:
  redis_data:
  minio_data:
  grafana_data:
