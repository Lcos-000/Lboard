# 个性化配置
# 常用于本地开发
server:
  # 服务器地址
  addr: ":8080"
  # Gin模式
  gin_mode: "debug"
# 日志配置
log:
  # 日志级别
  # 可选值：debug, info, warn, error, fatal
  # 默认值：debug
  level: "debug"
  # 日志格式
  # 可选值：console, json
  # 默认值：console
  format: "console"
# 认证配置
auth:
  # JWT密钥
  jwt_secret: "dev-secret-change-me"
  # 访问令牌过期时间
  access_token_ttl: "24h"
# 数据库配置
postgres:
  # 数据库连接字符串
  # 用于连接PostgreSQL数据库
  dsn: "postgres://whiteboard:whiteboard@localhost:5432/whiteboard?sslmode=disable"
# Redis配置
redis:
  addr: "localhost:6379"
  # Redis密码
  password: ""
  # Redis数据库索引
  db: 0
# Minio配置
minio:
  # Minio端点
  endpoint: "localhost:9000"
  # Minio访问密钥
  access_key: "minioadmin" 
  # Minio密钥
  secret_key: "minioadmin"
  # 是否使用SSL 
  use_ssl: false
  # Minio桶名
  bucket: "whiteboard"
